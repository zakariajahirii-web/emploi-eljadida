<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Emploi El Jadida — ANAPEC Direct</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--oc:#0A5C7A;--om:#0E7A9E;--ol:#E8F4F8;--sd:#F5F0E8;--ik:#1A1A2E;--is:#4A4A6A;--ac:#E85D26;--gn:#1A7A4A;--bd:rgba(10,92,122,0.12);--r:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--sd);color:var(--ik);}
header{background:var(--oc);color:white;padding:0 24px;}
.hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:16px 0;flex-wrap:wrap;gap:10px;}
.ln{font-size:20px;font-weight:600;}
.lb{font-size:11px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);padding:3px 9px;border-radius:20px;font-family:'IBM Plex Mono',monospace;margin-left:8px;}
.hs{display:flex;gap:20px;}
.h{text-align:center;}
.hn{font-size:18px;font-weight:600;font-family:'IBM Plex Mono',monospace;}
.hl{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;}
.sw{background:var(--oc);padding:0 24px 18px;border-bottom:3px solid var(--ac);}
.sb{max-width:1100px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;}
.si{flex:1;min-width:160px;padding:10px 14px;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;background:white;color:var(--ik);outline:none;}
.si:focus{box-shadow:0 0 0 2px var(--ac);}
.fs{padding:10px 12px;border:none;border-radius:var(--r);font-family:inherit;font-size:13px;background:rgba(255,255,255,0.15);color:white;outline:none;cursor:pointer;}
.fs option{color:var(--ik);background:white;}
.bsr{padding:10px 20px;background:var(--ac);color:white;border:none;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;}
.main{max-width:1100px;margin:22px auto;padding:0 24px;}
.ib{background:white;border-radius:var(--r);border:1px solid var(--bd);padding:13px 17px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.ib-t{font-size:13px;color:var(--is);}
.ib-t strong{color:var(--ik);}
.lv{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--gn);}
.lv::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--gn);animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.lc{font-size:13px;color:var(--is);}
.lc strong{color:var(--ik);font-family:'IBM Plex Mono',monospace;}
.card{background:white;border-radius:var(--r);border:1px solid var(--bd);padding:16px 18px;margin-bottom:9px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:var(--oc);box-shadow:0 2px 12px rgba(10,92,122,0.1);}
.card.fresh{border-left:3px solid var(--ac);}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:5px;}
.ti{font-size:15px;font-weight:600;color:var(--oc);line-height:1.3;flex:1;}
.bg{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 8px;border-radius:4px;white-space:nowrap;font-weight:500;background:#E8F8EE;color:#1A6A3A;border:1px solid #A8DEB8;flex-shrink:0;}
.ag{font-size:12px;color:var(--is);margin-bottom:7px;}
.ds{font-size:12px;color:var(--is);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.tg{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.tg span{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.t1{background:var(--ol);color:var(--oc);}
.t2{background:#FFF3EE;color:#C04010;}
.t3{background:#EEFFF6;color:#1A5A35;}
.t4{background:#F0F4FF;color:#3A4AA0;}
.t5{background:#FFF8E8;color:#8A5A00;}
.t6{background:var(--sd);color:var(--is);font-family:'IBM Plex Mono',monospace;font-size:10px;}
.cf{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding-top:11px;border-top:1px solid var(--bd);flex-wrap:wrap;}
.bd2{font-size:12px;font-weight:500;color:var(--oc);background:var(--ol);border:none;padding:7px 12px;border-radius:6px;cursor:pointer;}
.bd2:hover{background:#CBE5EF;}
.bo{font-size:12px;font-weight:500;color:white;background:var(--oc);border:none;padding:7px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;}
.bo:hover{background:var(--om);}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;color:white;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(10,20,40,0.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.ov.open{display:flex;}
.mo{background:white;border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(10,20,40,0.25);display:flex;flex-direction:column;}
.mh{padding:20px 24px 14px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:white;border-radius:16px 16px 0 0;}
.mr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.mx{margin-left:auto;width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:white;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--is);flex-shrink:0;}
.mx:hover{background:var(--sd);}
.mt{font-size:19px;font-weight:600;color:var(--ik);line-height:1.3;margin-bottom:4px;}
.mc{font-size:13px;color:var(--is);}
.mb{padding:20px 24px;}
.mm{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px;}
.mk{background:var(--sd);border-radius:8px;padding:10px 12px;}
.ml{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--is);margin-bottom:3px;}
.mv{font-size:13px;font-weight:500;color:var(--ik);}
.ms{margin-bottom:14px;}
.mst{font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--is);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
.msb{font-size:14px;color:var(--ik);line-height:1.7;white-space:pre-line;}
.mf{padding:14px 24px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:white;border-radius:0 0 16px 16px;}
.bl{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:7px;text-decoration:none;}
.blp{background:var(--oc);color:white;}
.blg{background:var(--sd);color:var(--ik);border:1px solid var(--bd);}
@media(max-width:600px){.hs{gap:12px;}.hn{font-size:16px;}.cf{flex-wrap:wrap;}}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div>
      <span class="ln">Emploi El Jadida</span>
      <span class="lb">ANAPEC · DIRECT</span>
    </div>
    <div class="hs">
      <div class="h"><div class="hn" id="s-total">...</div><div class="hl">Offres (20j)</div></div>
      <div class="h"><div class="hn" id="s-date">...</div><div class="hl">Mis à jour</div></div>
    </div>
  </div>
</header>

<div class="sw">
  <div class="sb">
    <input class="si" id="q" type="text" placeholder="Poste, mot-clé..."/>
    <select class="fs" id="fc">
      <option value="">Tous les contrats</option>
      <option value="CDI">CDI</option>
      <option value="CDD">CDD</option>
      <option value="CI">Contrat Insertion (CI)</option>
      <option value="saisonnier">Saisonnier</option>
    </select>
    <select class="fs" id="fs2">
      <option value="">Tous les secteurs</option>
      <option value="industrie">Industrie</option>
      <option value="agriculture">Agriculture</option>
      <option value="hotellerie">Hôtellerie</option>
      <option value="btp">BTP</option>
      <option value="logistique">Logistique</option>
      <option value="finance">Finance</option>
      <option value="education">Éducation</option>
    </select>
    <button class="bsr" onclick="applyF()">Rechercher</button>
  </div>
</div>

<div class="main">
  <div class="ib">
    <div class="ib-t">
      <strong id="ib-date">Chargement...</strong>
      — Offres des 20 derniers jours — El Jadida &amp; région
    </div>
    <div class="lv">Mis à jour chaque jour automatiquement</div>
  </div>
  <div class="lh">
    <div class="lc"><strong id="rc">...</strong> offres trouvées</div>
  </div>
  <div id="list">
    <div style="text-align:center;padding:60px;color:var(--is);">
      <div style="font-size:32px;margin-bottom:12px;">⏳</div>
      <p style="font-size:15px;">Chargement des offres...</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="ov" id="modal" onclick="closeOv(event)">
  <div class="mo">
    <div class="mh">
      <div class="mr">
        <span class="bg">ANAPEC El Jadida</span>
        <span style="font-size:11px;color:var(--is)" id="m-ref"></span>
        <span style="font-size:11px;color:var(--is);margin-left:5px" id="m-dt"></span>
        <button class="mx" onclick="cm()">✕</button>
      </div>
      <div class="mt" id="m-ti"></div>
      <div class="mc" id="m-ag"></div>
    </div>
    <div class="mb">
      <div class="mm" id="m-meta"></div>
      <div class="ms" id="m-desc-s" style="display:none">
        <div class="mst">Description du profil</div>
        <div class="msb" id="m-ds"></div>
      </div>
    </div>
    <div class="mf">
      <button class="bl blg" onclick="cm()">Fermer</button>
      <a class="bl blp" id="m-lk" href="#" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Postuler sur ANAPEC
      </a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let OFFRES = [], F = [], cur = null;

/* ═══════════════════════════════════════════════════
   Charger les données depuis ./data/offres.json
   Ce fichier est mis à jour automatiquement chaque
   matin par GitHub Actions (scraper Python)
═══════════════════════════════════════════════════ */
async function load() {
  try {
    const r = await fetch('./data/offres.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    OFFRES = data.offres || [];
    F = [...OFFRES];

    document.getElementById('s-total').textContent  = OFFRES.length;
    document.getElementById('s-date').textContent   = (data.date_maj || '').split(' à ')[0] || '';
    document.getElementById('ib-date').textContent  = 'Dernière mise à jour : ' + (data.date_maj || '');
    document.getElementById('rc').textContent       = OFFRES.length;

    render(OFFRES);
  } catch(e) {
    document.getElementById('list').innerHTML = `
      <div style="background:white;border-radius:10px;border:1px solid var(--bd);padding:40px;text-align:center;color:var(--is);">
        <div style="font-size:40px;margin-bottom:12px;">⏳</div>
        <p style="font-size:16px;font-weight:500;margin-bottom:8px;color:var(--ik)">Données pas encore disponibles</p>
        <p style="font-size:13px;margin-bottom:16px">Le scraper tourne chaque matin à 7h.<br>Revenez demain ou relancez manuellement depuis GitHub.</p>
        <button onclick="load()" style="padding:9px 20px;background:var(--oc);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;">↻ Réessayer</button>
        <p style="font-size:11px;color:#aaa;margin-top:14px;">Erreur: ${e.message}</p>
      </div>`;
  }
}

function applyF() {
  const q  = document.getElementById('q').value.toLowerCase().trim();
  const fc = document.getElementById('fc').value.toLowerCase();
  const fs = document.getElementById('fs2').value.toLowerCase();
  F = OFFRES.filter(o => {
    const t = `${o.titre} ${o.agence} ${o.secteur} ${o.ref} ${o.description}`.toLowerCase();
    return (!q || t.includes(q))
        && (!fc || (o.type_contrat || '').toLowerCase().includes(fc))
        && (!fs || t.includes(fs));
  });
  document.getElementById('rc').textContent = F.length;
  render(F);
}

function render(list) {
  const c = document.getElementById('list');
  if (!list.length) {
    c.innerHTML = '<div style="background:white;border-radius:10px;border:1px solid var(--bd);padding:40px;text-align:center;color:var(--is);"><p style="font-size:15px;margin-bottom:6px">Aucune offre trouvée</p><p style="font-size:13px">Essayez d\'autres mots-clés</p></div>';
    return;
  }
  c.innerHTML = list.map((o, i) => `
    <div class="card ${i < 5 ? 'fresh' : ''}" onclick='om(${J(o)})'>
      <div class="ct"><div class="ti">${x(o.titre)}</div><span class="bg">ANAPEC</span></div>
      <div class="ag">🏢 ${x(o.agence)}</div>
      ${o.description ? `<div class="ds">${x(o.description)}</div>` : ''}
      <div class="tg">
        <span class="t1">📍 ${x(o.lieu || 'El Jadida')}</span>
        ${o.type_contrat ? `<span class="t2">${x(o.type_contrat)}</span>` : ''}
        ${o.secteur ? `<span class="t3">${x(o.secteur)}</span>` : ''}
        <span class="t4">👥 ${x(o.nb || '1')} poste(s)</span>
        ${o.formation ? `<span class="t5">🎓 ${x((o.formation || '').substring(0, 40))}</span>` : ''}
        ${o.experience ? `<span class="t4">⏱ ${x((o.experience || '').substring(0, 35))}</span>` : ''}
        <span class="t6">${x(o.date)}</span>
      </div>
      <div class="cf">
        <button class="bd2" onclick="event.stopPropagation();om(${J(o)})">Voir détails →</button>
        <a class="bo" href="${x(o.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Postuler ANAPEC
        </a>
      </div>
    </div>`).join('');
}

function om(o) {
  cur = o;
  document.getElementById('m-ref').textContent = o.ref || '';
  document.getElementById('m-dt').textContent  = o.date ? `Publié le ${o.date}` : '';
  document.getElementById('m-ti').textContent  = o.titre || '';
  document.getElementById('m-ag').textContent  = '🏢 ' + (o.agence || 'ANAPEC El Jadida');
  document.getElementById('m-meta').innerHTML  = [
    { l: 'Localisation', v: o.lieu || 'El Jadida',             i: '📍' },
    { l: 'Contrat',      v: o.type_contrat || 'Non précisé',   i: '📄' },
    { l: 'Secteur',      v: o.secteur || 'Non précisé',        i: '🏭' },
    { l: 'Postes',       v: (o.nb || '1') + ' poste(s)',       i: '👥' },
    { l: 'Date début',   v: o.date_debut || 'Non précisé',     i: '📅' },
    { l: 'Formation',    v: (o.formation || 'Non précisé').substring(0, 60), i: '🎓' },
    { l: 'Expérience',   v: (o.experience || 'Non précisé').substring(0, 60), i: '⏱' },
  ].map(m => `<div class="mk"><div class="ml">${m.i} ${m.l}</div><div class="mv">${x(m.v)}</div></div>`).join('');

  const desc = o.description || '';
  const descSec = document.getElementById('m-desc-s');
  descSec.style.display = desc ? 'block' : 'none';
  if (desc) document.getElementById('m-ds').textContent = desc;

  document.getElementById('m-lk').href = o.url;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOv(e) { if (e.target.id === 'modal') cm(); }
function cm() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; cur = null; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') cm(); });

function J(o) { return JSON.stringify(o).replace(/'/g, "&#39;"); }
function x(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Charger au démarrage
load();
document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') applyF(); });
</script>
</body>
</html>
