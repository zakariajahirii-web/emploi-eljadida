name: Scraper ANAPEC El Jadida

on:
  schedule:
    - cron: '0 7 * * *'   # Chaque jour à 7h00 UTC (8h ou 9h Maroc)
  workflow_dispatch:        # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write           # Indispensable pour pouvoir faire git push

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Lancer le scraper
        run: python scraper.py

      - name: Vérifier si le JSON a changé
        id: check
        run: |
          git diff --quiet data/offres.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit et push du JSON mis à jour
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/offres.json
          git commit -m "Mise à jour offres ANAPEC — $(date '+%d/%m/%Y %H:%M')"
          git push
