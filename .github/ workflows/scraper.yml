name: Scraper ANAPEC

on:
  schedule:
    - cron: "0 7 * * *"  # tous les jours a 07:00 UTC (08:00 heure Maroc)
  workflow_dispatch:      # permet de lancer manuellement depuis GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessaire pour git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: zakariajahirii-web
          GITHUB_REPO: emploi-eljadida
        run: python scraper.py

      - name: Commit and push updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/offres.json
          git diff --staged --quiet && echo "Pas de changement" || git commit -m "ANAPEC El Jadida — mise a jour automatique"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
