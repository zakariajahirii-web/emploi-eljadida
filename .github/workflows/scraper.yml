name: Scraper ANAPEC El Jadida

on:
  schedule:
    # Chaque jour à 7h00 (heure Maroc = UTC+1, donc 6h UTC)
    - cron: '0 6 * * *'
  # Permet aussi de lancer manuellement depuis GitHub
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Lancer le scraper ANAPEC
        run: python scraper.py

      - name: Vérifier les données collectées
        run: |
          if [ -f data/offres.json ]; then
            echo "✓ offres.json créé"
            python -c "
          import json
          with open('data/offres.json') as f:
              d = json.load(f)
          print(f'  Total : {d[\"total\"]} offres')
          print(f'  Date  : {d[\"date_maj\"]}')
          "
          else
            echo "✗ offres.json absent"
            exit 1
          fi

      - name: Publier les données sur GitHub
        run: |
          git config user.name  "ANAPEC Scraper Bot"
          git config user.email "bot@emploi-eljadida.github.io"
          git add data/offres.json
          git diff --staged --quiet || git commit -m "Mise à jour offres ANAPEC - $(date '+%d/%m/%Y %H:%M')"
          git push
